    - list [ref=e67]:
      - listitem [ref=e68]:
        - heading "公司介绍" [level=1] [ref=e69]
        - paragraph [ref=e71] [cursor=pointer]: 公司介绍
        - generic [ref=e73]:
          - img [ref=e75]
          - paragraph [ref=e76]: 春秋航空股份有限公司（以下简称“春秋航空”或“公司”）作为中国首批民营航空公司之一，于2004年经中国民用航空总局批准在上海成立，定位于低成本航空业务模式，主要从事国内、国际及港澳台航空客货运输业务及与航空运输业务相关的服务。
          - paragraph [ref=e77]: 公司于2005年首航，设立初期主要提供国内航线的客运业务，于2010年开始经营国际及地区航线，并于2011年开始加快开辟国际及地区航线的步伐。截至2025年一季度末，公司在飞航线共251条，其中国内在飞航线188条，国内各线城市往返东北亚和东南亚国际在飞航线60条，港澳台航线3条。截至2025年一季度末，公司已拥有131架A320系列飞机机队，成为国内在飞航线、载运旅客人次、旅客周转量等规模最大的民营航空公司之一，同时也是东北亚地区领先的低成本航空公司。
          - paragraph [ref=e78]: 目前，国内枢纽建设方面，公司已形成以服务长三角区域经济一体化建设的上海基地为核心、扬州和宁波基地为支撑的华东枢纽，以服务粤港澳大湾区建设的广州基地、深圳分公司为核心、揭阳基地为支撑的华南机场枢纽，以服务京津冀一体化建设的石家庄河北分公司为核心的华北机场枢纽，以服务东北全面振兴战略建设的沈阳和大连基地为核心的东北枢纽，以服务新时代西部大开发建设的兰州基地、西安分公司为核心的西北枢纽，以服务成渝双城经济圈等重要市场的成都天府基地为核心的西南枢纽，南昌基地的建设也为服务中部地区崛起战略创造了更多机遇。国际航线目前则仍以日本大阪和韩国济州为境外过夜航站，未来将择机恢复泰国曼谷过夜航站，背靠国内各主要基地和目的地网络，聚焦东北亚和东南亚地区重要市场，主动服务“一带一路”“RCEP”建设等国家重大战略。
          - paragraph [ref=e79]: 公司拥有国内最早独立于中航信体系的分销、订座、结算和离港系统，每年为公司节省大量的销售费用支出。此外，公司还拥有自主研发的收益管理系统、航线网络系统、航班调配系统、机组排班系统、维修管理系统、地面管控系统和安全管理系统等，覆盖主要业务流程点，并仍在不断优化和完善。凭借自身强大的互联网航空信息系统所拥有的全面开发、运营和维护能力，公司已经具备向国内其他航空公司输出具有自主知识产权的系统解决方案的技术能力。
          - paragraph [ref=e80]: 区别于全服务航空公司，公司定位于低成本航空经营模式，凭借价格优势吸引大量由对价格较为敏感的自费旅客以及追求高性价比的商务旅客构成的细分市场客户。自成立以来，在严格确保飞行安全和服务质量的前提下，最大限度地利用现有资产，实现高效率的航空生产运营。公司的经营模式可归纳为下述特点：
          - generic [ref=e81]:
            - heading "◆ “两单”——单一机型与单一舱位" [level=3] [ref=e82]
            - paragraph [ref=e83]: – 单一机型可通过集中采购降低飞机购买和租赁成本
            - paragraph [ref=e84]: – 单一经济舱布局可使公司较两舱机型飞机高出约10%~15%座位数
          - generic [ref=e85]:
            - heading "◆ “两高”——高客座率与高飞机日利用率" [level=3] [ref=e86]
            - paragraph [ref=e87]: – 客座率和飞机日利用率均显著高于行业平均水平
          - generic [ref=e88]:
            - heading "◆ “两低”——低销售费用和低管理费用" [level=3] [ref=e89]
            - paragraph [ref=e90]: – 98%以上散客机票通过电子商务或直销渠道销售
            - paragraph [ref=e91]: – 使用自主研发且独立于中航信系统的分销、订座、结算和离港系统
            - paragraph [ref=e92]: – 最大程度地利用第三方服务商在各地机场的资源与服务，在确保飞行安全、运行品质和服务质量的前提下尽可能降低日常管理费用
          - paragraph [ref=e93]: 此外，公司利用差异化经营模式，不断丰富利润率较高的创新辅助产品和服务项目，将包括客舱餐饮、行李、选座等全服务航空含入票价内的产品和服务作为机上有偿服务供乘客选择，并推出一系列出行相关的产品和服务项目，在客户从订票、支付、登机、乘机和出行的过程中为其提供更多的自主权与便利性。
          - paragraph [ref=e94]: 公司拥有先进的管理理念，是国内民航上市公司中首家推出股权激励制度的公司，高级管理层及核心技术人员通过上海春翔投资有限公司及上海春翼投资有限公司持有公司股份，并于2016年9月实施第一期限制性股票股权激励计划，之后从2018年开始连续每年实施员工持股计划。多层次的股权激励制度确保了中高管理层与核心技术团队的稳定性与积极性。公司恪守勤俭奋斗原则，在保证安全飞行的前提下，倡导环保、节俭、高效的低成本运营理念，在全公司营造“奋斗、远虑、节俭、感恩”的企业文化。
          - paragraph [ref=e95]: 未来几年，公司将继续优化和加强低成本航空的业务模式与竞争优势，在确保飞行安全和准点的前提下，积极扩大机队规模和航线网络，致力于实现“成为具有竞争力的国际化低成本航空公司，为旅客提供实惠且有品质的航空服务”的战略目标。
