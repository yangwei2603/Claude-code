<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>任务进展反馈 - 原型</title>
<style>
  :root {
    --primary: #1a1a2e;
    --secondary: #16213e;
    --accent: #e94560;
    --accent-light: #ff6b6b;
    --gold: #d4af37;
    --text: #eaeaea;
    --text-muted: #8b8b9a;
    --bg: #0f0f1a;
    --card-bg: rgba(22, 33, 62, 0.8);
    --border: rgba(233, 69, 96, 0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    padding: 40px 20px;
  }

  .container { max-width: 700px; margin: 0 auto; }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .card-header {
    padding: 20px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .task-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .task-meta {
    font-size: 12px;
    color: var(--text-muted);
  }

  .card-body { padding: 24px; }

  /* 提示语 */
  .tip {
    background: rgba(233, 69, 96, 0.08);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .tip-icon { font-size: 18px; }

  /* 表单样式 */
  .form-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--gold);
    margin-bottom: 16px;
    padding-left: 12px;
    border-left: 2px solid var(--accent);
  }

  .form-group { margin-bottom: 16px; }

  .form-label {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    padding: 10px 14px;
    background: rgba(15, 15, 26, 0.6);
    border: 1px solid rgba(233, 69, 96, 0.2);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
    transition: border-color 0.2s;
  }

  .form-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  textarea.form-input {
    min-height: 80px;
    resize: vertical;
  }

  select.form-input {
    cursor: pointer;
  }

  select.form-input option {
    background: var(--primary);
  }

  .form-row { display: flex; gap: 16px; }
  .form-row .form-group { flex: 1; }

  /* 单选按钮 */
  .radio-group { display: flex; gap: 24px; margin-top: 8px; }

  .radio-item {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-muted);
  }

  .radio-item input { display: none; }

  .radio-dot {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(233, 69, 96, 0.4);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .radio-item input:checked + .radio-dot {
    border-color: var(--accent);
    background: var(--accent);
  }

  .radio-item input:checked + .radio-dot::after {
    content: '';
    width: 6px;
    height: 6px;
    background: #fff;
    border-radius: 50%;
  }

  /* 步骤列表 */
  .step-list {
    border: 1px solid rgba(233, 69, 96, 0.15);
    border-radius: 8px;
    overflow: hidden;
  }

  .step-item {
    display: flex;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .step-item:last-child { border-bottom: none; }

  .step-num {
    width: 36px;
    height: 36px;
    background: rgba(233, 69, 96, 0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
  }

  .step-item input {
    flex: 1;
    border: none;
    padding: 10px 14px;
    background: transparent;
    color: var(--text);
    font-size: 14px;
  }

  .step-item input:focus {
    outline: none;
    background: rgba(233, 69, 96, 0.05);
  }

  .step-item input::placeholder { color: var(--text-muted); }

  .add-step {
    width: 100%;
    padding: 10px;
    border: 1px dashed rgba(233, 69, 96, 0.3);
    border-radius: 6px;
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    margin-top: 10px;
    transition: all 0.2s;
  }

  .add-step:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(233, 69, 96, 0.05);
  }

  /* 切换链接 */
  .plan-toggle {
    text-align: center;
    padding: 16px 0 0;
    border-top: 1px dashed rgba(255,255,255,0.08);
    margin-top: 20px;
  }

  .plan-toggle a {
    color: var(--text-muted);
    font-size: 13px;
    text-decoration: none;
    cursor: pointer;
    transition: color 0.2s;
  }

  .plan-toggle a:hover { color: var(--accent); }

  /* 计划表单（隐藏） */
  .plan-section {
    display: none;
    border-top: 1px dashed rgba(255,255,255,0.08);
    margin-top: 20px;
    padding-top: 20px;
  }

  .plan-section.active { display: block; }

  /* 按钮组 */
  .btn-group {
    display: flex;
    gap: 12px;
    margin-top: 24px;
    justify-content: flex-end;
  }

  .btn {
    padding: 10px 20px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }

  .btn-primary:hover { background: var(--accent-light); }

  .btn-secondary {
    background: rgba(255,255,255,0.06);
    color: var(--text-muted);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .btn-secondary:hover {
    background: rgba(255,255,255,0.1);
    color: var(--text);
  }

  .btn-plan { background: var(--gold); color: #1a1a2e; }
  .btn-plan:hover { background: #e8c555; }

  /* 状态栏 */
  .status-bar {
    padding: 14px 24px;
    background: rgba(15, 15, 26, 0.4);
    border-top: 1px solid rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .status-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
  }

  .status-resolve {
    background: rgba(34, 197, 94, 0.15);
    color: #4ade80;
  }

  .status-plan {
    background: rgba(59, 130, 246, 0.15);
    color: #60a5fa;
  }

  /* 已解决状态卡片 */
  .resolved-card .card-body {
    text-align: center;
    padding: 40px 24px;
  }

  .resolved-icon {
    font-size: 48px;
    margin-bottom: 12px;
  }

  .resolved-time {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 20px;
  }

  .btn-group-center { justify-content: center; }
</style>
</head>
<body>
<div class="container">

  <!-- 默认：解决表单 -->
  <div class="card">
    <div class="card-header">
      <div class="task-title">供应商资质审核流程优化</div>
      <div class="task-meta">内控二期 · 负责人：张明 · 截止 2026/06/15</div>
    </div>

    <div class="card-body">
      <!-- 提示语 -->
      <div class="tip">
        <span class="tip-icon">💡</span>
        如果任务可以在 <strong>5 天内解决</strong>，请直接填写解决方案。
      </div>

      <!-- 解决表单 -->
      <div class="form-title">解决方案</div>

      <div class="form-group">
        <label class="form-label">解决说明</label>
        <textarea class="form-input" placeholder="描述解决方案..."></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">关闭时间</label>
          <input type="date" class="form-input" value="2026-05-12">
        </div>
        <div class="form-group">
          <label class="form-label">验证方式</label>
          <div class="radio-group">
            <label class="radio-item">
              <input type="radio" name="verify" value="auto" checked>
              <span class="radio-dot"></span>
              <span>自动关闭</span>
            </label>
            <label class="radio-item">
              <input type="radio" name="verify" value="manual">
              <span class="radio-dot"></span>
              <span>人工确认</span>
            </label>
          </div>
        </div>
      </div>

      <!-- 展开计划 -->
      <div class="plan-toggle">
        <a onclick="showPlan()">无法在5天内解决？填写执行计划</a>
      </div>

      <!-- 计划表单 -->
      <div id="plan-section" class="plan-section">
        <div class="form-title">执行计划</div>

        <div class="form-group">
          <label class="form-label">计划完成时间</label>
          <input type="date" class="form-input" value="2026-06-15">
        </div>

        <div class="form-group">
          <label class="form-label">执行步骤</label>
          <div class="step-list">
            <div class="step-item">
              <span class="step-num">1</span>
              <input type="text" placeholder="输入步骤描述...">
            </div>
          </div>
          <button class="add-step" onclick="addStep()">+ 添加步骤</button>
        </div>

        <div class="btn-group">
          <button class="btn btn-secondary" onclick="hidePlan()">取消</button>
          <button class="btn btn-plan" onclick="submitPlan()">提交计划</button>
        </div>
      </div>

      <!-- 解决表单按钮 -->
      <div id="resolve-btns" class="btn-group">
        <button class="btn btn-secondary" onclick="cancel()">取消</button>
        <button class="btn btn-primary" onclick="submitResolve()">确认关闭</button>
      </div>
    </div>

    <!-- 状态栏 -->
    <div class="status-bar">
      <span>当前状态：</span>
      <span class="status-tag status-resolve">✓ 待关闭</span>
    </div>
  </div>

  <!-- 计划中状态示例 -->
  <div class="card">
    <div class="card-header">
      <div class="task-title">应收账款账龄分析</div>
      <div class="task-meta">内控二期 · 计划中</div>
    </div>

    <div class="card-body">
      <div style="background: rgba(59, 130, 246, 0.08); border: 1px solid rgba(59, 130, 246, 0.2); border-radius: 8px; padding: 16px; margin-bottom: 20px;">
        <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 8px;">执行计划</div>
        <div style="font-size: 14px; line-height: 1.8;">
          1. 梳理应收账款明细<br>
          2. 按账龄分层分析<br>
          3. 制定催收策略
        </div>
        <div style="font-size: 12px; color: var(--text-muted); margin-top: 12px;">计划完成：2026/06/30</div>
      </div>

      <div class="btn-group">
        <button class="btn btn-secondary" onclick="cancel()">取消</button>
        <button class="btn btn-primary" onclick="markDone()">标记完成</button>
      </div>
    </div>

    <div class="status-bar">
      <span>当前状态：</span>
      <span class="status-tag status-plan">⏸ 计划中</span>
    </div>
  </div>

  <!-- 已解决状态示例 -->
  <div class="card resolved-card">
    <div class="card-header">
      <div class="task-title">历史遗留问题清理</div>
      <div class="task-meta">内控二期 · 已解决</div>
    </div>

    <div class="card-body">
      <div class="resolved-icon">✓</div>
      <div class="resolved-time">已于 2026/05/10 验证关闭</div>
      <div class="btn-group btn-group-center">
        <button class="btn btn-secondary" onclick="reopen()">重新打开</button>
        <button class="btn btn-primary" onclick="viewDetail()">查看详情</button>
      </div>
    </div>

    <div class="status-bar">
      <span>当前状态：</span>
      <span class="status-tag status-resolve">✓ 已解决</span>
    </div>
  </div>

</div>

<script>
  function showPlan() {
    document.getElementById('plan-section').classList.add('active');
    document.getElementById('resolve-btns').style.display = 'none';
    document.querySelector('.plan-toggle').style.display = 'none';
  }

  function hidePlan() {
    document.getElementById('plan-section').classList.remove('active');
    document.getElementById('resolve-btns').style.display = 'flex';
    document.querySelector('.plan-toggle').style.display = 'block';
  }

  function addStep() {
    const list = document.querySelector('.step-list');
    const count = list.children.length + 1;
    const div = document.createElement('div');
    div.className = 'step-item';
    div.innerHTML = '<span class="step-num">' + count + '</span><input type="text" placeholder="输入步骤描述...">';
    list.appendChild(div);
  }

  function submitResolve() { alert('任务已关闭'); }
  function submitPlan() { alert('计划已提交'); }
  function markDone() { alert('已标记完成'); }
  function reopen() { alert('任务已重新打开'); }
  function viewDetail() { alert('查看详情'); }
  function cancel() { alert('已取消'); }
</script>
</body>
</html>
