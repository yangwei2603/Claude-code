[program:requirement-pool]
command=/opt/requirement-pool-hermes/venv/bin/python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
directory=/opt/requirement-pool-hermes
user=www-data
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/var/log/requirement-pool/supervisor.log
environment=PYTHONPATH="/opt/requirement-pool-hermes"
