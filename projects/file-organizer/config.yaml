    target: "06-团队与运营/01-沟通协作/周报月报"
  - keywords: ["会议纪要", "会议记录"]
    target: "06-团队与运营/01-沟通协作/会议纪要"
  - keywords: ["培训", "教程", "课程"]
    target: "01-知识库管理/02-培训学习"
  - keywords: ["Agent", "智能体"]
    target: "04-创新应用/00-Agent智能体"
  - keywords: ["RPA", "自动化"]
    target: "04-创新应用/01-流程自动化"
  - keywords: ["数字化战略", "转型战略", "战略规划"]
