# 文件智能整理器配置
# 版本: v6.0

# 源目录（被扫描的文件夹）
source_dir: "./test_files"

# 目标目录（留空则与源目录相同）
target_dir: ""

# 运行模式
dry_run: true  # true=预览模式, false=执行模式
keep_original: false  # true=复制, false=移动

# 扫描选项
scan_days: 7  # 增量扫描天数，99999=全量扫描
large_file_threshold_mb: 100  # 大文件阈值（MB）

# LLM 智能分类
use_llm: true  # 是否启用 LLM 分类

# LLM Provider 配置（支持 DeepSeek 和 Claude）
llm:
  provider: "deepseek"  # deepseek 或 claude
  # 企业私有部署
  # base_url: "https://api.deepseek.com"  # DeepSeek 官方
  # base_url: "http://your-deepseek-server:11434/v1"  # 私有化部署 (如 Ollama)
  # 个人 API
  api_key: "${DEEPSEEK_API_KEY}"  # 环境变量
  model: "deepseek-chat"  # DeepSeek 模型
  # model: "claude-opus-4-7"  # Claude 模型

# 日志
log_dir: "logs"
state_dir: "state"
rollback_dir: "state/rollback"

# 保护目录（跳过不扫描）
protected_folders:
  - ".svn"
  - ".git"
  - ".idea"
  - "__pycache__"
  - "node_modules"
  - ".vscode"
  - "logs"
  - "state"

# 自动删除的临时文件模式（正则）
delete_patterns:
  - "^~/$"       # Office 临时文件
  - "/.svn-base$"
  - "/.tmp$"
  - "/.temp$"
  - "^/.DS_Store$"
  - "^Thumbs/.db$"

# 备份文件扩展名（移动到备份目录）
backup_extensions:
  - ".bak"
  - ".backup"

# 关键词规则（Step 1 分类）
# 未命中规则的文件将交给 LLM 分类
