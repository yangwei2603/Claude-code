# Agent Skill System Configuration

# LLM 配置（MiniMax + DeepSeek + 公司本地大模型 三接入，按需切换）
llm:
  # 当前使用提供商：minimax | deepseek | local | auto
  # auto 模式：简单任务→MiniMax，复杂推理→DeepSeek，涉密/内部数据→本地模型
  provider: "minimax"

  minimax:
    api_key: "${MINIMAX_API_KEY}"
    model: "MiniMax-Text-02"
    base_url: "https://api.minimax.chat/v1"
    max_tokens: 8192
    temperature: 0.7

  deepseek:
    api_key: "${DEEPSEEK_API_KEY}"
    model: "deepseek-chat"
    base_url: "https://api.deepseek.com/v1"
    max_tokens: 8192
    temperature: 0.7

  # 公司本地大模型（OneAPI 代理）
  local:
    api_key: "${LOCAL_API_KEY}"
    model: "Qwen3-VL-235B-A22B-Instruct-AWQ"
    base_url: "https://llmui.springgroup.cn/v1"
    max_tokens: 8192
    temperature: 0.7
    # 适用场景：涉密数据、内部文档、财务数据等不宜外传的请求

  # 向量嵌入模型（Obsidian 等知识库检索）
  embedding:
    api_key: "${LOCAL_API_KEY}"
    model: "Qwen3-Embedding-8B"
    base_url: "https://llmui.springgroup.cn/v1"
    dimensions: 1536

system:
  name: "Agent Skill System"
  version: "1.0.0"
  description: "Enterprise-grade multi-agent workflow system"

# Agent 配置
agents:
  pm_agent:
    enabled: true
    model: "minimax"          # 结构化输出 → MiniMax
    llm_model: "MiniMax-Text-01"
    max_retries: 3

  task_agent:
    enabled: true
    model: "minimax"          # 任务分解 → MiniMax
    llm_model: "MiniMax-Text-01"
    max_retries: 2

  dev_agent:
    enabled: true
    model: "deepseek"         # 复杂代码生成 → DeepSeek
    llm_model: "deepseek-chat"
    max_retries: 3
    language: "python"
    framework: "fastapi"

  test_agent:
    enabled: true
    model: "minimax"          # 测试用例生成 → MiniMax
    llm_model: "MiniMax-Text-01"
    test_framework: "pytest"

  fix_agent:
    enabled: true
    model: "deepseek"         # Bug修复推理 → DeepSeek
    llm_model: "deepseek-chat"
    max_retries: 5

  review_agent:
    enabled: true
    model: "minimax"          # 代码审查 → MiniMax
    llm_model: "MiniMax-Text-01"
    security_check: true
    performance_check: true
    sql_check: true

  git_agent:
    enabled: true
    auto_commit: false
    auto_push: false
    default_branch: "main"

  deploy_agent:
    enabled: true
    environments:
      - name: "dev"
        auto_deploy: true
      - name: "staging"
        auto_deploy: false
      - name: "production"
        auto_deploy: false
        requires_approval: true

  monitor_agent:
    enabled: true
    check_interval: 60  # seconds
    alert_threshold: 10  # error count

# 工作流配置
workflow:
  auto_fix: true
  auto_review: true
  auto_deploy: false
  stop_on_error: false

# 通知配置
notifications:
  enabled: false
  channels:
    - type: "slack"
      webhook_url: ""
    - type: "email"
      recipients: []

# 存储配置
storage:
  results_dir: "./results"
  logs_dir: "./logs"
  reports_dir: "./reports"
