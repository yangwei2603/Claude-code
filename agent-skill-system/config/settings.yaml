# Agent Skill System Configuration

system:
  name: "Agent Skill System"
  version: "1.0.0"
  description: "Enterprise-grade multi-agent workflow system"

# Agent 配置
agents:
  pm_agent:
    enabled: true
    model: "claude-sonnet-4-6"
    max_retries: 3

  task_agent:
    enabled: true
    model: "claude-sonnet-4-6"
    max_retries: 2

  dev_agent:
    enabled: true
    model: "claude-opus-4-7"
    max_retries: 3
    language: "python"
    framework: "fastapi"

  test_agent:
    enabled: true
    model: "claude-sonnet-4-6"
    test_framework: "pytest"

  fix_agent:
    enabled: true
    model: "claude-opus-4-7"
    max_retries: 5

  review_agent:
    enabled: true
    model: "claude-sonnet-4-6"
    security_check: true
    performance_check: true
    sql_check: true

  git_agent:
    enabled: true
    auto_commit: false
    auto_push: false
    default_branch: "main"

  deploy_agent:
    enabled: true
    environments:
      - name: "dev"
        auto_deploy: true
      - name: "staging"
        auto_deploy: false
      - name: "production"
        auto_deploy: false
        requires_approval: true

  monitor_agent:
    enabled: true
    check_interval: 60  # seconds
    alert_threshold: 10  # error count

# 工作流配置
workflow:
  auto_fix: true
  auto_review: true
  auto_deploy: false
  stop_on_error: false

# 通知配置
notifications:
  enabled: false
  channels:
    - type: "slack"
      webhook_url: ""
    - type: "email"
      recipients: []

# 存储配置
storage:
  results_dir: "./results"
  logs_dir: "./logs"
  reports_dir: "./reports"