let sortCol = "avg_ci";
let sortAsc = true;

function ciColor(v) {
  if (v < 50) return "#e74c3c";
  if (v < 70) return "#f39c12";
  return "#27ae60";
}

function ciBar(v) {
  return "<span style=\"width:" + v + "%;background:" + ciColor(v) + "\"></span>";
}

function render(rows) {
  const tbody = document.getElementById("tbody");
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty-state">无匹配结果</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(function(p) {
    var isCritical = p.avg_ci < 50;
    var rowClass = isCritical ? 'critical' : '';
    return "<tr class=\"" + rowClass + "\">" +
      "<td>" + p.name + "</td>" +
      "<td>" + p.emp_no + "</td>" +
      "<td>" + p.flight_cnt + "</td>" +
      "<td><span class=\"ci-bar-wrap\">" + ciBar(p.avg_ci) + "</span>" + p.avg_ci + "%</td>" +
      "<td style=\"color:" + (p.ci_gap < -20 ? '#e74c3c' : '#f39c12') + "\">" + p.ci_gap + "%</td>" +
      "<td>" + p.avg_alt + "</td>" +
      "<td>" + p.route_cnt + "</td>" +
      "<td><span class=\"badge " + (isCritical ? "critical" : "warning") + "\">" + (isCritical ? "重点关注" : "需要关注") + "</span></td>" +
    "</tr>";
  }).join('');
}

function filterTable() {
  var search = document.getElementById("search").value.toLowerCase();
  var filter = document.getElementById("filter").value;
  var filtered = data.filter(function(p) {
    var matchSearch = p.name.toLowerCase().indexOf(search) !== -1 || String(p.emp_no).indexOf(search) !== -1;
    var matchFilter = filter === "all" || (filter === "critical" && p.avg_ci < 50) || (filter === "warning" && p.avg_ci >= 50 && p.avg_ci < 70);
    return matchSearch && matchFilter;
  });
  filtered.sort(function(a, b) {
    var av = a[sortCol], bv = b[sortCol];
    if (typeof av === "string") av = av.toLowerCase(), bv = bv.toLowerCase();
    return sortAsc ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
  });
  render(filtered);
}

document.querySelectorAll("th[data-sort]").forEach(function(th) {
  th.onclick = function() {
    var col = th.dataset.sort;
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }
    filterTable();
  };
});
